name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: '发布版本号 (如 v0.1.0)'
        required: true
        default: 'v0.1.0'

env:
  RELEASE_TAG: ${{ github.ref_name || github.event.inputs.tag_name }}

jobs:
  build-android:
    name: Build Android Split APKs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Restore Android signing files
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          test -n "$ANDROID_KEYSTORE_BASE64"
          test -n "$ANDROID_KEYSTORE_PASSWORD"
          test -n "$ANDROID_KEY_ALIAS"
          test -n "$ANDROID_KEY_PASSWORD"

          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/upload-keystore.jks

          cat > android/key.properties <<EOF
          storeFile=../upload-keystore.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Validate Android signing key
        shell: bash
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          test -s android/upload-keystore.jks
          test -s android/key.properties

          keytool -list -v \
            -keystore android/upload-keystore.jks \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -alias "$ANDROID_KEY_ALIAS" \
            -keypass "$ANDROID_KEY_PASSWORD" \
            > /dev/null

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build split APKs
        run: flutter build apk --release --split-per-abi

      - name: Rename APKs
        shell: bash
        run: |
          set -euo pipefail
          cd build/app/outputs/flutter-apk

          for apk in app-*-release.apk; do
            abi="${apk#app-}"
            abi="${abi%-release.apk}"
            mv "$apk" "kira-${RELEASE_TAG}-${abi}.apk"
          done

          ls -lh kira-*.apk

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-split-apks
          path: build/app/outputs/flutter-apk/kira-*.apk

  release:
    name: Create Release
    needs: build-android
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download APKs
        uses: actions/download-artifact@v4
        with:
          name: android-split-apks
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Kira ${{ env.RELEASE_TAG }}
          body: |
            ## Kira ${{ env.RELEASE_TAG }}

            ### 安装说明
            - `arm64-v8a`：适用于大多数 64 位 Android 手机，优先下载这个
            - `armeabi-v7a`：适用于较老的 32 位 Android 设备
            - `x86_64`：适用于部分模拟器或 x86_64 设备
          draft: false
          prerelease: false
          files: artifacts/*.apk
